<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1.00001,viewport-fit=cover" />
  <title>Ashtanga Sangha</title>
  <style>
    html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; }
    #root { display: flex; flex: 1; }
    body { overflow: hidden; overscroll-behavior: none; }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script>
    // Fix Expo metro web bundle: reload entry script as ES module
    document.addEventListener('DOMContentLoaded', function() {
      var scripts = document.querySelectorAll('script[src*="entry-"]');
      scripts.forEach(function(s) {
        if (!s.type || s.type !== 'module') {
          var m = document.createElement('script');
          m.type = 'module';
          m.src = s.src;
          s.parentNode.removeChild(s);
          document.body.appendChild(m);
        }
      });
    });
  </script>
</body>
</html>

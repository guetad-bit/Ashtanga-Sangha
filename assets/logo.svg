<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradient for the circle -->
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A87C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4845A;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="0" dy="2" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="#1A1A2E" />

  <!-- Inner ring - subtle -->
  <circle cx="200" cy="200" r="155" fill="none" stroke="#2A2A45" stroke-width="0.75" />

  <!-- Stylized figure in a yoga pose (simplified Surya Namaskar / prayer) -->
  <g transform="translate(200, 185)" filter="url(#softShadow)">
    <!-- Head -->
    <circle cx="0" cy="-62" r="16" fill="url(#warmGrad)" />

    <!-- Body - clean single line -->
    <line x1="0" y1="-46" x2="0" y2="20" stroke="url(#warmGrad)" stroke-width="5" stroke-linecap="round" />

    <!-- Arms raised in prayer / namaste above head -->
    <path d="M 0,-30 C -15,-50 -12,-70 -4,-78" stroke="url(#warmGrad)" stroke-width="4.5" fill="none" stroke-linecap="round" />
    <path d="M 0,-30 C 15,-50 12,-70 4,-78" stroke="url(#warmGrad)" stroke-width="4.5" fill="none" stroke-linecap="round" />

    <!-- Legs in lotus-like seated position -->
    <path d="M 0,20 C -10,30 -35,35 -42,28" stroke="url(#warmGrad)" stroke-width="4.5" fill="none" stroke-linecap="round" />
    <path d="M 0,20 C 10,30 35,35 42,28" stroke="url(#warmGrad)" stroke-width="4.5" fill="none" stroke-linecap="round" />

    <!-- Subtle crossed ankles -->
    <path d="M -42,28 C -38,35 -15,38 0,32" stroke="url(#warmGrad)" stroke-width="4" fill="none" stroke-linecap="round" />
    <path d="M 42,28 C 38,35 15,38 0,32" stroke="url(#warmGrad)" stroke-width="4" fill="none" stroke-linecap="round" />
  </g>

  <!-- Three small dots representing sangha (community) -->
  <circle cx="170" cy="108" r="3.5" fill="#E8A87C" opacity="0.6" />
  <circle cx="200" cy="98" r="3.5" fill="#E8A87C" opacity="0.8" />
  <circle cx="230" cy="108" r="3.5" fill="#E8A87C" opacity="0.6" />

  <!-- Text: ASHTANGA -->
  <text x="200" y="310" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="400" letter-spacing="8" fill="#E8E8E8">
    ASHTANGA
  </text>

  <!-- Text: SANGHA -->
  <text x="200" y="340" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="300" letter-spacing="12" fill="#B8B8C8">
    SANGHA
  </text>
</svg>
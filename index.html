<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Sangha — Returning soon</title>
  <meta name="description" content="A quieter, fuller sangha is on its way." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F5EFE6;
      --warm: #F9F4ED;
      --ink: #2A2420;
      --sub: #6B5E52;
      --muted: #8A7A68;
      --clay: #C26B4D;
      --clay-dark: #A5502F;
      --sage: #A8B59B;
      --sand: #D4C5A9;
      --border: #E8DFD0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      padding: 48px 24px;
      background:
        radial-gradient(ellipse at top, rgba(194,107,77,0.06) 0%, transparent 55%),
        radial-gradient(ellipse at bottom, rgba(168,181,155,0.05) 0%, transparent 50%),
        var(--bg);
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(42,36,32,0.04) 1px, transparent 0);
      background-size: 24px 24px;
      pointer-events: none;
    }
    .brand {
      position: relative;
      z-index: 1;
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 300;
      font-size: 22px;
      letter-spacing: 7px;
      color: var(--clay);
      padding-left: 7px;
      margin-top: 8px;
    }
    .main {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .ornament {
      width: 56px;
      height: 56px;
      margin-bottom: 32px;
      opacity: 0.85;
    }
    .kicker {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--clay);
      margin-bottom: 18px;
      text-transform: uppercase;
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 300;
      font-size: clamp(34px, 6vw, 54px);
      line-height: 1.1;
      color: var(--ink);
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }
    h1 em {
      font-style: italic;
      color: var(--clay);
      font-weight: 400;
    }
    .lede {
      font-size: 16px;
      line-height: 1.65;
      color: var(--sub);
      max-width: 420px;
      margin-bottom: 34px;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      opacity: 0.6;
    }
    .divider-line {
      width: 40px;
      height: 1px;
      background: var(--border);
    }
    .divider-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--clay);
    }
    .quote {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 17px;
      line-height: 1.6;
      color: var(--sub);
      margin-bottom: 10px;
    }
    .quote-attr {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    /* Passphrase gate */
    .gate-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 360px;
      margin-top: 40px;
    }
    .gate-toggle {
      display: block;
      margin: 0 auto;
      background: none;
      border: none;
      font: inherit;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.3px;
      padding: 8px 12px;
      transition: color 0.2s;
    }
    .gate-toggle:hover { color: var(--clay); }
    .gate-form {
      display: none;
      margin-top: 14px;
      gap: 8px;
      flex-direction: row;
      align-items: stretch;
    }
    .gate-form.open { display: flex; }
    .gate-input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      font: inherit;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }
    .gate-input:focus { border-color: var(--clay); }
    .gate-btn {
      padding: 0 18px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--clay) 0%, var(--clay-dark) 100%);
      color: #fff;
      font: inherit;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.3px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(165,80,47,0.25);
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .gate-btn:hover { box-shadow: 0 6px 16px rgba(165,80,47,0.35); }
    .gate-btn:active { transform: translateY(1px); }
    .gate-msg {
      font-size: 12px;
      color: var(--clay-dark);
      text-align: center;
      margin-top: 10px;
      min-height: 16px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .gate-msg.show { opacity: 1; }

    footer {
      position: relative;
      z-index: 1;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 40px;
    }

    @media (max-width: 480px) {
      body { padding: 36px 20px; }
      .ornament { width: 48px; height: 48px; margin-bottom: 24px; }
      .quote { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="brand">sangha</div>

  <main class="main">
    <!-- Minimalist lotus ornament -->
    <svg class="ornament" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="3" fill="#C26B4D"/>
      <path d="M32 10 C36 18, 36 26, 32 30 C28 26, 28 18, 32 10 Z" fill="none" stroke="#C26B4D" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M50 20 C46 24, 40 28, 34 30 C36 24, 42 20, 50 20 Z" fill="none" stroke="#C26B4D" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M14 20 C22 20, 28 24, 30 30 C24 28, 18 24, 14 20 Z" fill="none" stroke="#C26B4D" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M54 38 C48 36, 40 34, 34 32 C40 32, 48 34, 54 38 Z" fill="none" stroke="#C26B4D" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M10 38 C18 34, 24 32, 30 32 C24 34, 16 36, 10 38 Z" fill="none" stroke="#C26B4D" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M32 54 C28 46, 28 38, 32 34 C36 38, 36 46, 32 54 Z" fill="none" stroke="#C26B4D" stroke-width="1.2" stroke-linejoin="round"/>
    </svg>

    <div class="kicker">— Under Practice —</div>
    <h1>Returning soon,<br/><em>quieter & fuller</em></h1>
    <p class="lede">
      We're taking a breath and reshaping the sangha experience — a new home, a new rhythm. Please check back shortly.
    </p>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-dot"></span>
      <span class="divider-line"></span>
    </div>

    <p class="quote">"Practice, and all is coming."</p>
    <p class="quote-attr">Sri K. Pattabhi Jois</p>
  </main>

  <div class="gate-wrap">
    <button class="gate-toggle" type="button" onclick="toggleGate()">Have the passphrase?</button>
    <form class="gate-form" id="gate-form" onsubmit="return tryUnlock(event)">
      <input class="gate-input" id="gate-input" type="password" placeholder="Enter passphrase" autocomplete="off" />
      <button class="gate-btn" type="submit">Enter</button>
    </form>
    <div class="gate-msg" id="gate-msg"></div>
  </div>

  <footer>© Sangha 2026</footer>

  <script>
    // ── Client-side passphrase gate ─────────────────────────────────────
    // NOTE: Not real security — anyone who views source can read it.
    // Fine for keeping casual visitors out. To change, edit PASS below.
    const PASS = 'mysore';
    // Points at the OLD app (main branch). The new design lives at a separate
    // project (practice-sangha.vercel.app) with its own login — never combined here.
    const UNLOCK_URL = 'https://ashtanga-sangha-git-main-guetad-bits-projects.vercel.app/';

    function toggleGate() {
      document.getElementById('gate-form').classList.toggle('open');
      setTimeout(() => document.getElementById('gate-input').focus(), 50);
    }

    function tryUnlock(e) {
      e.preventDefault();
      const input = document.getElementById('gate-input');
      const msg = document.getElementById('gate-msg');
      if (input.value.trim().toLowerCase() === PASS) {
        msg.textContent = 'Unlocking…';
        msg.style.color = 'var(--sage)';
        msg.classList.add('show');
        try { localStorage.setItem('sangha_gate', '1'); } catch(_) {}
        setTimeout(() => { window.location.href = UNLOCK_URL; }, 500);
      } else {
        msg.textContent = 'That doesn\u2019t match. Try again?';
        msg.style.color = 'var(--clay-dark)';
        msg.classList.add('show');
        input.value = '';
        input.focus();
      }
      return false;
    }

    try {
      if (localStorage.getItem('sangha_gate') === '1' && window.location.hash !== '#stay') {
        const wrap = document.querySelector('.gate-wrap');
        wrap.innerHTML = '<a href="' + UNLOCK_URL + '" class="gate-toggle" style="color:var(--clay);">Continue to sangha →</a>';
      }
    } catch(_) {}
  </script>
</body>
</html>
